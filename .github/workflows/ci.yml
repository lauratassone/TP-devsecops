name: secure-harbor-ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

env:
  IMAGE_NAME: tp-devsecops-demo
  HARBOR_REGISTRY: ${{ vars.HARBOR_REGISTRY }}
  HARBOR_PROJECT: ${{ vars.HARBOR_PROJECT || 'library' }}
  DAST_TARGET_URL: ${{ vars.DAST_TARGET_URL }}

jobs:
  dockerfile-lint:
    name: Hadolint Dockerfile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/Dockerfile
          failure-threshold: warning

  terraform-security:
    name: Terraform fmt validate tflint checkov
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.51.1

      - name: Init TFLint plugins
        run: tflint --init --config "$GITHUB_WORKSPACE/.tflint.hcl"

      - name: Run TFLint
        run: tflint --recursive --config "$GITHUB_WORKSPACE/.tflint.hcl"

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          config_file: .checkov.yml
          soft_fail: false

  sast:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/default
            p/golang
            p/dockerfile
            p/terraform

  build-scan-sign:
    name: Build Trivy Harbor push Cosign
    runs-on: ubuntu-latest
    needs:
      - dockerfile-lint
      - terraform-security
      - sast
    outputs:
      image-ref: ${{ steps.meta.outputs.image-ref }}
      image-digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          if [ -n "${HARBOR_REGISTRY}" ]; then
            image_ref="${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMAGE_NAME}:${GITHUB_SHA}"
            echo "harbor-enabled=true" >> "${GITHUB_OUTPUT}"
          else
            image_ref="${IMAGE_NAME}:${GITHUB_SHA}"
            echo "harbor-enabled=false" >> "${GITHUB_OUTPUT}"
          fi
          echo "image-ref=${image_ref}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        if: ${{ steps.meta.outputs.harbor-enabled == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build local image for scanning
        uses: docker/build-push-action@v6
        with:
          context: app
          file: app/Dockerfile
          load: true
          tags: ${{ steps.meta.outputs.image-ref }}

      - name: Trivy vulnerability scan blocking
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.image-ref }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: "1"

      - name: Trivy SARIF report
        uses: aquasecurity/trivy-action@v0.36.0
        if: always()
        with:
          image-ref: ${{ steps.meta.outputs.image-ref }}
          format: sarif
          output: trivy-report.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: "0"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-report.sarif

      - name: Push image to Harbor
        id: push
        if: ${{ steps.meta.outputs.harbor-enabled == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: app
          file: app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.image-ref }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign image keyless
        if: ${{ steps.meta.outputs.harbor-enabled == 'true' }}
        env:
          COSIGN_YES: "true"
          IMAGE_REF: ${{ steps.meta.outputs.image-ref }}
          IMAGE_DIGEST: ${{ steps.push.outputs.digest }}
        run: cosign sign "${IMAGE_REF}@${IMAGE_DIGEST}"

  dast:
    name: ZAP baseline DAST
    runs-on: ubuntu-latest
    needs:
      - build-scan-sign
    if: ${{ vars.DAST_TARGET_URL != '' }}
    steps:
      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ env.DAST_TARGET_URL }}
          fail_action: true
          cmd_options: "-a -j"
