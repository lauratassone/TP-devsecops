apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: harbor
  namespace: {{ .Values.namespace | quote }}
  labels:
    app.kubernetes.io/name: harbor
    app.kubernetes.io/managed-by: terraform
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - {{ .Values.namespace | quote }}
  selector:
    matchLabels:
      app: harbor
  endpoints:
    - port: http-metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: true
